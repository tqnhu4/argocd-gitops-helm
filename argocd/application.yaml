apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: helm-webapp
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/tqnhu4/argocd-gitops-helm
    targetRevision: HEAD
    path: charts/webapp

    helm:
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true